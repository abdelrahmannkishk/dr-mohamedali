    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = { apiKey: "AIzaSyDpmP1ZRW0o4qAHwPQaaxdFZxHopJsNhAQ", authDomain: "zoomclean-29d20.firebaseapp.com", databaseURL: "https://zoomclean-29d20-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "zoomclean-29d20" };
        const app = initializeApp(config); const db = getDatabase(app);
        window.db = db; window.ref = ref; window.set = set; window.onValue = onValue; window.get = get; window.update = update; window.push = push; window.remove = remove;
        initApp();

    <script>
        let user = null; let dbData = {}; let tempImg = ""; let editingQId = null; let editingLTId = null; let editingCHId = null; let currentAdmTab = null; let quizInt = null; let wmInterval = null;

        function toggleAuth(t){ document.getElementById('lForm').classList.toggle('hidden', t==='reg'); document.getElementById('rForm').classList.toggle('hidden', t==='login'); }
        async function handleLogin() {
            const ph = document.getElementById('lPh').value.trim(); const ps = document.getElementById('lPs').value.trim();
            if(ph === "01550908118" && ps === "22574") { user = { name: "الكينج محمد علي", phone: ph, role: 'admin', level: 'ALL', balance: 999999 }; localStorage.setItem('golden_user', JSON.stringify(user)); location.reload(); }
            else { 
                const snap = await window.get(window.ref(window.db, 'academy/students/'+ph)); 
                if(snap.exists() && snap.val().pass === ps) { 
                    const u = snap.val();
                    if(u.locked) return alertK("تنبيه", "هذا الحساب محظور! تواصل مع الدعم.");
                    const sK = Math.random().toString(36).substr(2, 9);
                    u.sessionKey = sK;
                    await window.update(window.ref(window.db, 'academy/students/'+ph), { sessionKey: sK });
                    localStorage.setItem('king_sessionKey', sK);
                    user = u; localStorage.setItem('golden_user', JSON.stringify(user)); location.reload(); 
                } else alertK("خطأ", "رقم الموبايل أو كلمة المرور غير صحيحة!"); 
            }
        }
        async function handleRegister() {
            const ph = document.getElementById('rPh').value.trim();
            const u = { name: document.getElementById('rN').value, phone: ph, pass: document.getElementById('rPs').value, level: document.getElementById('rLv').value, balance: 0, role: 'student' };
            if (!u.name || !u.phone || !u.pass || !u.level) {
                alertK("خطأ", "يجب ملء جميع الحقول!");
                return;
            }
            await window.set(window.ref(window.db, 'academy/students/'+ph), u); alertK("نجاح", "تم إنشاء الحساب! يمكنك الدخول الآن."); toggleAuth('login');
        }

        function getCached(key) { try { const data = localStorage.getItem('king_' + key); return data ? JSON.parse(data) : null; } catch(e) { return null; } }
        function setCached(key, val) { try { localStorage.setItem('king_' + key, JSON.stringify(val)); } catch(e) {} }

        function initApp() {
            const saved = localStorage.getItem('golden_user');
            if(saved) {
                user = JSON.parse(saved); document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainHeader').classList.remove('hidden'); document.getElementById('bottomNav').classList.remove('hidden');
                if(user.role === 'admin') document.getElementById('admQuick').classList.remove('hidden');
                
                // Load from cache initially for instant UI
                dbData.chapters = getCached('chapters') || {};
                dbData.lectures = getCached('lectures') || {};
                dbData.questions = getCached('questions') || {};
                dbData.quizResults = getCached('quizResults') || {};
                dbData.chats = getCached('chats') || {};
                dbData.students = {}; 
                dbData.rechargeRequests = {};
                renderCourses(); renderForum(); renderRanks();
                if(user.role !== 'admin') document.getElementById('dBal').innerText = (user.balance || 0) + " ج.م";

                // Specific Listener: Chapters
                window.onValue(window.ref(window.db, 'academy/chapters'), snap => {
                    if(snap.exists()) { dbData.chapters = snap.val(); setCached('chapters', dbData.chapters); renderCourses(); window.admRefresh(); }
                });
                
                // Specific Listener: Lectures
                window.onValue(window.ref(window.db, 'academy/lectures'), snap => {
                    dbData.lectures = snap.exists() ? snap.val() : {};
                    setCached('lectures', dbData.lectures); renderCourses(); window.admRefresh();
                });

                // Specific Listener: Questions
                window.onValue(window.ref(window.db, 'academy/questions'), snap => {
                    dbData.questions = snap.exists() ? snap.val() : {};
                    setCached('questions', dbData.questions); window.admRefresh();
                });

                // Specific Listener: Chats (Forum)
                window.onValue(window.ref(window.db, 'academy/chats'), snap => {
                    const newChats = snap.exists() ? snap.val() : {};
                    const isNew = Object.keys(newChats).length !== (dbData.chats ? Object.keys(dbData.chats).length : 0);
                    dbData.chats = newChats; 
                    setCached('chats', dbData.chats); 
                    if(isNew || document.getElementById('chatBox').innerHTML === '') renderForum(); 
                    window.admRefresh();
                });

                // Specific Listener: Quiz Results (Ranks)
                window.onValue(window.ref(window.db, 'academy/quizResults'), snap => {
                    dbData.quizResults = snap.exists() ? snap.val() : {};
                    setCached('quizResults', dbData.quizResults); renderRanks(); window.admRefresh();
                });

                // Specific Listener: Current User (Wallet & access)
                if(user.role !== 'admin') {
                    window.onValue(window.ref(window.db, 'academy/students/' + user.phone), snap => {
                        if(snap.exists()) {
                            const newUserData = snap.val();
                            if(newUserData.locked) { alertK("تنبيه", "تم حظر حسابك!"); logout(); return; }
                            const localSK = localStorage.getItem('king_sessionKey');
                            if(newUserData.sessionKey && localSK && newUserData.sessionKey !== localSK) { alertK("تنبيه", "تم تسجيل الدخول من جهاز آخر!"); logout(); return; }
                            // Only update specific fields to prevent overriding local interactions unnecessarily
                            user.balance = newUserData.balance;
                            user.courses = newUserData.courses || {};
                            localStorage.setItem('golden_user', JSON.stringify(user));
                            document.getElementById('dBal').innerText = user.balance + " ج.م";
                            // Re-render courses if access changed
                            const currentCoursesHTML = document.getElementById('coursesGrid').innerHTML;
                            renderCourses();
                        }
                    });
                } else {
                    // Admins need broader access, listen to all students specifically if needed, 
                    // or just handle it within the admin panel dynamically.
                    // For admin panel students list:
                    window.onValue(window.ref(window.db, 'academy/students'), snap => {
                        console.log("Admin Students Update:", snap.val());
                        if(snap.exists()) { dbData.students = snap.val(); window.admRefresh(); }
                    });
                    // Listen to recharge requests
                    window.onValue(window.ref(window.db, 'academy/rechargeRequests'), snap => {
                        dbData.rechargeRequests = snap.exists() ? snap.val() : {};
                        window.admRefresh();
                    });
                }
            }
        }

        function renderCourses() {
            const grid = document.getElementById('coursesGrid');
            const chs = Object.values(dbData.chapters || {}).filter(c => user.role === 'admin' || c.level === user.level);
            grid.innerHTML = chs.map(ch => `
                <div class="royal-card p-6 text-center">
                    <img src="${ch.img || ''}" class="w-full h-40 object-cover rounded-2xl mb-4 border">
                    <h4 class="text-xl font-black mb-4">${ch.title}</h4>
                    <div class="flex gap-2">
                        <button onclick="openChapter('${ch.id}')" class="flex-1 bg-slate-100 py-3 rounded-xl font-black text-xs">المحتوى</button>
                        ${(user.role === 'admin' || (user.courses && user.courses[ch.id])) ? '<div class="flex-1 text-green-600 font-black">متاح ✅</div>' : `<button onclick="buyCourse('${ch.id}', ${ch.price})" class="flex-1 btn-main py-3 text-xs">${ch.price} ج.م</button>`}
                    </div>
                </div>`).join('');
        }

        window.openChapter = (id) => {
            if(user.role !== 'admin' && !(user.courses && user.courses[id])) return alertK("تنبيه", "اشترك أولاً في الكورس!");
            const lecs = Object.values(dbData.lectures || {}).filter(l => l.chId === id).sort((a,b) => a.id.localeCompare(b.id));
            let results = dbData.quizResults ? Object.values(dbData.quizResults).filter(r => r.phone === user.phone) : [];
            document.getElementById('lessonsList').innerHTML = lecs.map((l, idx) => {
                const qCount = Object.values(dbData.questions || {}).filter(q => q.lecId === l.id).length;
                const prevPassed = idx === 0 || results.some(r => r.lecId === lecs[idx-1].id && r.score >= 50);
                const isLocked = !prevPassed && user.role !== 'admin';

                const inp = document.getElementById('modalInput'); inp.classList.remove('hidden'); inp.value = ""; inp.focus();
                document.getElementById('modalNo').classList.remove('hidden');
                document.getElementById('modalNo').onclick = () => { d.style.display = 'none'; res(null); };
                document.getElementById('modalYes').onclick = () => { d.style.display = 'none'; res(inp.value); };
            });
        };

        window.toggleLock = async (ph, current) => { if(await confirmK(current ? "فك الحظر؟" : "حظر الطالب؟", "هل أنت متأكد من تغيير حالة هذا الطالب؟")) await window.update(window.ref(window.db, 'academy/students/'+ph), { locked: !current }); };
        window.reqRecharge = async () => {
            const amt = await promptK("طلب شحن رصيد", "أدخل المبلغ الذي قمت بتحويله:");
            if(!amt || isNaN(amt)) return;
            const id = "REQ"+Date.now();
            await window.set(window.ref(window.db, 'academy/rechargeRequests/'+id), { id, phone: user.phone, name: user.name, amount: parseInt(amt), time: Date.now(), status: 'pending' });
            alertK("نجاح", "تم إرسال طلبك! سيتم المراجعة والتحويل فوراً. ✅");
        };
        window.accReq = async (id, ph, amt) => {
            if(!await confirmK("قبول الطلب؟", "سيتم إضافة المبلغ لرصيد الطالب.")) return;
            const snap = await window.get(window.ref(window.db, 'academy/students/'+ph));
            const curBal = snap.exists() ? (snap.val().balance || 0) : 0;
            const updates = {};
            updates[`academy/students/${ph}/balance`] = curBal + amt;
            updates[`academy/rechargeRequests/${id}`] = null;
            await window.update(window.ref(window.db), updates);
            alertK("اتمام الشحن", "تم القبول والشحن! ✅");
        };
        window.rejReq = async (id) => { if(await confirmK("رفض الطلب؟", "هل تريد حذف هذا الطلب؟")) await window.remove(window.ref(window.db, 'academy/rechargeRequests/'+id)); };
        
        window.svCh = async () => { 
            const id = editingCHId || "CH"+Date.now(); 
            const title = document.getElementById('at').value;
            const price = document.getElementById('ap').value;
            const level = document.getElementById('al').value;
            
            if(editingCHId) {
                await window.update(window.ref(window.db, 'academy/chapters/'+id), { title, price, level, img: tempImg });
                alertK("نجاح", "تم تحديث الكورس بنجاح! ✅");
            } else {
                await window.set(window.ref(window.db, 'academy/chapters/'+id), { id, title, price, level, img: tempImg });
                alertK("نجاح", "تم رفع الكورس بنجاح! 🚀");
            }
            admTab('ch'); 
        };

        window.svLe = async () => { 
            const id = editingLTId || "L"+Date.now(); 
            const chId = document.getElementById('lch').value;
            const title = document.getElementById('lt').value;
            const url = document.getElementById('lu').value;
            if(editingLTId) {
                await window.update(window.ref(window.db, 'academy/lectures/'+id), { chId, title, url });
                alertK("نجاح", "تم تحديث المحاضرة بنجاح! ✅");
            } else {
                await window.set(window.ref(window.db, 'academy/lectures/'+id), { id, chId, title, url });
                alertK("نجاح", "تم رفع المحاضرة بنجاح! 🚀");
            }
            admTab('le'); 
        };
        window.genTurbo = async () => { const amt = document.getElementById('camt').value; const total = parseInt(document.getElementById('ccnt').value); let c = 0; const batch = async () => { const ups = {}; for(let i=0; i<200 && c<total; i++) { const code = "KING-"+Math.random().toString(36).substr(2,6).toUpperCase(); ups[`academy/codes/${code}`] = { code, amount: amt, used: false }; c++; } await window.update(window.ref(window.db), ups); if(c < total) setTimeout(batch, 5); else alertK("نجاح", "تم توليد الأكواد بنجاح! 👑"); }; batch(); };
        window.showSection = (id) => { document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active')); document.getElementById(id+'Sec').classList.add('active'); };
        window.openAdmin = () => document.getElementById('adminPanel').classList.remove('hidden');
        window.closeAdmin = () => document.getElementById('adminPanel').classList.add('hidden');
        window.logout = () => { localStorage.clear(); location.reload(); };
        window.useCode = async () => { const c = document.getElementById('cInp').value.trim().toUpperCase(); if(!c) return; const snap = await window.get(window.ref(window.db, 'academy/codes/'+c)); if(snap.exists() && !snap.val().used) { const amt = parseInt(snap.val().amount); await window.update(window.ref(window.db, 'academy/students/'+user.phone), { balance: (user.balance || 0) + amt }); await window.update(window.ref(window.db, 'academy/codes/'+c), { used: true }); alertK("نجاح", "تم الشحن!"); } else alertK("خطأ", "الكود غير صحيح!"); };
        window.buyCourse = async (id, pr) => { 
            // 1. Fetch fresh balance to prevent stale client data from allowing purchase
            const snap = await window.get(window.ref(window.db, `academy/students/${user.phone}/balance`));
            const realBalance = snap.exists() ? snap.val() : (user.balance || 0);

            if(realBalance >= pr) { 
                if(await confirmK("تأكيد الشراء", "هل تريد شراء هذا الكورس؟")) { 
                    const u = {}; 
                    u[`academy/students/${user.phone}/balance`] = realBalance - pr; 
                    u[`academy/students/${user.phone}/courses/${id}`] = true; 
                    await window.update(window.ref(window.db), u); 
                    window.alertK("مبروك!", "تم شراء الكورس بنجاح!");
                } 
            } else window.alertK("عفواً", "رصيدك غير كافٍ لشراء هذا الكورس."); 
        };
        window.sendMsg = async () => { const i = document.getElementById('msgInp'); if(!i.value) return; await window.push(window.ref(window.db, 'academy/chats'), { name: user.name, phone: user.phone, text: i.value, level: user.level, time: Date.now() }); i.value = ""; };
        function renderForum() { 
            const b = document.getElementById('chatBox'); 
            const cs = Object.values(dbData.chats || {}).filter(m => user.role === 'admin' || m.level === user.level); 
            const isAtBottom = b.scrollHeight - b.scrollTop <= b.clientHeight + 100; // Check if user is near bottom
            b.innerHTML = cs.map(m => `<div class="flex flex-col ${m.phone === user.phone ? 'items-end' : 'items-start'}"><span class="text-[9px] opacity-30">${m.name}</span><div class="p-3 rounded-2xl font-bold ${m.phone === user.phone ? 'bg-red-600 text-white' : 'bg-white shadow-sm'}">${m.text}</div></div>`).join(''); 
            if(isAtBottom) b.scrollTop = b.scrollHeight; // Only auto-scroll if already at bottom to prevent hijacking
        }
        function renderRanks() {
            const list = document.getElementById('ranksList'); 
            const select = document.getElementById('userLecRankSelect');
            if(!dbData.quizResults) return;
            
            // Populate Dropdown if empty
            const lecs = Object.values(dbData.lectures || {}).filter(l => Object.values(dbData.quizResults).some(r => r.lecId === l.id));
            const currentVal = select.value;
            select.innerHTML = '<option value="">اختر الامتحان لعرض الأوائل</option>' + lecs.map(l => `<option value="${l.id}" ${l.id === currentVal ? 'selected' : ''}>${l.title}</option>`).join('');

            if(select.value) renderFilteredRanks(select.value);
            else list.innerHTML = `<div class="p-16 text-center opacity-30 font-black text-xl border-4 border-dashed rounded-[40px]">☝️ اختر امتحاناً من القائمة أعلاه لعرض لوحة الصدارة</div>`;
        }

        window.renderFilteredRanks = (id) => {
            if(!id) return;
            const list = document.getElementById('ranksList');
            const results = Object.values(dbData.quizResults || {}).filter(r => r.lecId === id).sort((a,b) => a.time - b.time); // Chronological order
            const grouped = results.reduce((acc, r) => {
                const key = window.normalizeArabic(r.student);
                if(!key) return acc;
                if(!acc[key]) acc[key] = { name: r.student, history: [] };
                acc[key].history.push(r.score);
                return acc;
            }, {});
            const sorted = Object.values(grouped).sort((a,b) => Math.max(...b.history) - Math.max(...a.history)).slice(0, 10);
            list.innerHTML = sorted.map((g, i) => {
                const bestScore = Math.max(...g.history);
                const rowId = `trials_${i}`;
                return `
                <div class="bg-white border-2 rounded-[30px] overflow-hidden border-slate-50 transition-all hover:border-red-100 hover:shadow-xl group">
                    <div class="p-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-slate-900 text-white flex items-center justify-center font-black group-hover:bg-red-600 transition-colors shadow-lg">${i+1}</div>
                            <div>
                                <div class="font-black text-xl group-hover:text-red-700 transition-colors">${g.name}</div>
                                <div class="text-sm text-slate-400 font-bold">أعلى درجة: <span class="text-red-600 font-black text-lg">${bestScore}%</span></div>
                            </div>
                        </div>
                        <button onclick="document.getElementById('${rowId}').classList.toggle('hidden'); this.querySelector('i').classList.toggle('fa-chevron-down'); this.querySelector('i').classList.toggle('fa-chevron-up')" class="flex items-center gap-2 px-6 py-2 bg-slate-50 rounded-2xl font-black text-xs hover:bg-slate-100 transition-colors">
                            <span>التفاصيل (${g.history.length})</span>
                            <i class="fas fa-chevron-down opacity-40"></i>
                        </button>
                    </div>
                    <div id="${rowId}" class="hidden p-6 bg-slate-50/50 border-t border-dashed flex gap-3 flex-wrap justify-center border-slate-100 animate-fadeIn">
                        ${g.history.map((s, idx) => `
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-[8px] font-black opacity-30 uppercase">م ${idx+1}</span>
                                <span class="px-3 py-1 bg-white border rounded-lg text-[10px] font-black shadow-sm ${s >= 50 ? 'text-green-600 border-green-100' : 'text-red-600 border-red-100'}">${s}%</span>
                            </div>`).join('')}
                    </div>
                </div>`;
            }).join('');
        };
    </script>
</body>
</html>
